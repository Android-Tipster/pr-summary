name: PR Summary

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Generate PR Summary
        uses: Android-Tipster/pr-summary@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
